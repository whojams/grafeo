name: Update grafeo-web

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-grafeo-web:
    name: Create grafeo-web update PR
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Wait for @grafeo-db/wasm to be available on npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for @grafeo-db/wasm@${VERSION} on npm..."
          for i in $(seq 1 30); do
            if npm view "@grafeo-db/wasm@${VERSION}" version 2>/dev/null; then
              echo "Package available"
              exit 0
            fi
            echo "Attempt $i/30: not yet available, waiting 30s..."
            sleep 30
          done
          echo "::error::@grafeo-db/wasm@${VERSION} not found on npm after 15 minutes"
          exit 1

      - name: Checkout grafeo-web
        uses: actions/checkout@v4
        with:
          repository: GrafeoDB/grafeo-web
          token: ${{ secrets.GRAFEO_WEB_TOKEN }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Update @grafeo-db/wasm dependency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm install "@grafeo-db/wasm@${VERSION}" --save

      - name: Add changelog entry
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE="${{ steps.version.outputs.date }}"
          ENTRY="## [${VERSION}] - ${DATE}\n\n_Align with Grafeo Core ${VERSION}_\n\n### Changed\n\n- **\\\`@grafeo-db/wasm\\\`**: updated to ${VERSION}\n"
          sed -i "/^All notable changes/a\\\\n${ENTRY}" CHANGELOG.md

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GRAFEO_WEB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="auto/wasm-${VERSION}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: update @grafeo-db/wasm to ${VERSION}"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Automated update triggered by [Grafeo v${VERSION}](https://github.com/GrafeoDB/grafeo/releases/tag/v${VERSION}).

          - Updated \`@grafeo-db/wasm\` to ${VERSION}
          - Added changelog entry
          - Typecheck and tests passed before PR creation

          ## Checklist

          - [ ] Review changelog entry (add new API surface if applicable)
          - [ ] Verify tests pass in grafeo-web CI
          - [ ] Merge when ready
          EOF

          gh pr create \
            --repo GrafeoDB/grafeo-web \
            --base main \
            --head "$BRANCH" \
            --title "Update @grafeo-db/wasm to ${VERSION}" \
            --body-file /tmp/pr-body.md
