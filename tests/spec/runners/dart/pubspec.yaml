name: grafeo_spec_runner
version: 0.0.1
description: >-
  Spec runner that discovers and executes .gtest files through
  the Dart grafeo bindings.
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  crypto: ^3.0.0
  grafeo:
    path: ../../../../crates/bindings/dart

dev_dependencies:
  test: ^1.24.0
