name: grafeo
version: 0.5.30
description: >-
  High-performance embeddable graph database with GQL support.
  Dart bindings for grafeo-c via dart:ffi.
repository: https://github.com/GrafeoDB/grafeo/tree/main/crates/bindings/dart
issue_tracker: https://github.com/GrafeoDB/grafeo/issues
homepage: https://grafeo.dev

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  ffi: ^2.1.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

topics:
  - database
  - graph
  - gql
  - ffi
