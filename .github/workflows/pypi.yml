name: PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter -m crates/bindings/python/Cargo.toml
          sccache: "true"
          manylinux: auto
          rust-toolchain: stable
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter -m crates/bindings/python/Cargo.toml
          sccache: "true"
          manylinux: musllinux_1_2
          rust-toolchain: stable
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -m crates/bindings/python/Cargo.toml
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -m crates/bindings/python/Cargo.toml
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/bindings/python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: [linux, musllinux, windows, macos, sdist]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # Build CLI Python wheels with the pre-built binary for each platform
  build-cli-wheels:
    name: CLI wheel (${{ matrix.wheel_platform }})
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            wheel_platform: manylinux_2_17_x86_64.manylinux2014_x86_64
            binary: grafeo
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            wheel_platform: manylinux_2_17_aarch64.manylinux2014_aarch64
            binary: grafeo
            archive: tar.gz
          - target: x86_64-apple-darwin
            wheel_platform: macosx_11_0_x86_64
            binary: grafeo
            archive: tar.gz
          - target: aarch64-apple-darwin
            wheel_platform: macosx_11_0_arm64
            binary: grafeo
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            wheel_platform: win_amd64
            binary: grafeo.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download CLI binary from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          ARCHIVE="grafeo-${TAG}-${{ matrix.target }}.${{ matrix.archive }}"
          gh release download "$TAG" --pattern "$ARCHIVE" --repo "${{ github.repository }}"
          if [[ "${{ matrix.archive }}" == "tar.gz" ]]; then
            tar xzf "$ARCHIVE"
          else
            unzip "$ARCHIVE"
          fi
          cp "grafeo-${TAG}-${{ matrix.target }}/${{ matrix.binary }}" \
             packages/grafeo-cli-python/grafeo_cli/

      - name: Build platform wheel
        working-directory: packages/grafeo-cli-python
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"${VERSION}\"/" grafeo_cli/__init__.py
          chmod +x "grafeo_cli/${{ matrix.binary }}" 2>/dev/null || true
          pip install build hatchling wheel
          python -m build --wheel
          python -m wheel tags --platform-tag=${{ matrix.wheel_platform }} --remove dist/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: cli-wheel-${{ matrix.wheel_platform }}
          path: packages/grafeo-cli-python/dist/*.whl

  # Publish CLI launcher to PyPI (platform wheels + source fallback)
  publish-cli:
    name: Publish CLI to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: build-cli-wheels
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all CLI wheels
        uses: actions/download-artifact@v8
        with:
          pattern: cli-wheel-*
          path: dist
          merge-multiple: true

      - name: Build source distribution (fallback, no binary)
        working-directory: packages/grafeo-cli-python
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"${VERSION}\"/" grafeo_cli/__init__.py
          pip install build hatchling
          python -m build --sdist --outdir ../../dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
        continue-on-error: true
