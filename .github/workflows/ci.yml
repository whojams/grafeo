name: CI

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main, 'release/*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Feature profiles tested in this workflow:
#
# 1. Full profile (--all-features): exercises every language parser (GQL,
#    Cypher, SPARQL, Gremlin, GraphQL, SQL/PGQ), AI features (vector-index,
#    text-index, hybrid-search, cdc), RDF, algorithms, tiered-storage, etc.
#    Used by: rust-check, rust-test, miri, coverage, benchmark-pr.
#
# 2. WASM profile (default-features=false, gql only): minimal feature set
#    for the wasm32-unknown-unknown target, which has no threads or OS APIs.
#    Used by: wasm-build (via scripts/build-wasm.sh).
#
# 3. Default profile (crate defaults, no explicit --features): whatever each
#    binding crate enables in its own Cargo.toml. The Python, Node.js, and Go
#    bindings each pull in "full" through their crate dependencies.
#    Used by: python-test, node-test, go-test.
#
# Note: the "embed" feature (ONNX embeddings, ~17 MB) is never included in
# "full" and is not tested here. It is opt-in only.

jobs:
  # Rust checks
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Full profile: --all-features enables all language parsers (GQL, Cypher,
      # SPARQL, Gremlin, GraphQL, SQL/PGQ), AI features (vector-index, text-index,
      # hybrid-search, cdc), RDF, algorithms, and other optional features.
      # This ensures every conditional compilation path compiles without warnings.
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Verify Rust examples compile (all feature profiles)
      - name: Build examples
        run: cargo build -p grafeo-examples --bins --features full

      # Validate that all // ISO: annotations in tests reference valid
      # feature IDs from docs/user-guide/gql/conformance.md.
      - name: Validate GQL conformance annotations
        run: python scripts/gql-conformance.py validate

      # Full profile: generates docs for every feature-gated module so no
      # broken intra-doc links or missing items slip through.
      - name: Check docs
        run: |
          rm -rf target/doc
          cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # ── Spec test streams ──────────────────────────────────────────────
  # Each binding runs its .gtest spec suite on a single runner (ubuntu)
  # after rust-check passes. Fast feedback before the expensive matrix.

  rust-spec:
    name: Rust Spec Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-spec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-spec-
      - name: Run spec tests
        run: cargo test -p grafeo-spec-tests --all-features

  python-spec:
    name: Python Spec Tests
    needs: [rust-check, rust-spec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pyspec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pyspec-
      - name: Build and install
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -m crates/bindings/python/Cargo.toml
          sccache: 'true'
      - name: Install package
        run: |
          uv pip install --system dist/*.whl
          uv pip install --system pytest pyyaml
      - name: Run spec tests
        run: pytest tests/spec/ -v

  node-spec:
    name: Node.js Spec Tests
    needs: [rust-check, rust-spec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nodespec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-nodespec-
      - name: Build native module
        working-directory: crates/bindings/node
        run: |
          npm install
          npm run build
      - name: Run spec tests
        run: npx vitest run tests/spec/runners/node/spec-runner.test.mjs

  go-spec:
    name: Go Spec Tests
    needs: [rust-check, rust-spec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gospec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-gospec-
      - name: Build shared library
        run: cargo build --release -p grafeo-c --features full
      - name: Run spec tests
        working-directory: tests/spec/runners/go
        run: |
          cp ../../../../target/release/libgrafeo_c.so .
          CGO_ENABLED=1 CGO_LDFLAGS="-L. -lgrafeo_c -lm -ldl -lpthread" LD_LIBRARY_PATH=. go test -count=1 -run TestSpec -timeout 120s -v

  csharp-spec:
    name: C# Spec Tests
    needs: [rust-check, rust-spec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-csspec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-csspec-
      - name: Build shared library
        run: cargo build --release -p grafeo-c --features full
      - name: Copy library
        run: cp target/release/libgrafeo_c.so tests/spec/runners/csharp/
      - name: Run spec tests
        working-directory: tests/spec/runners/csharp
        run: dotnet test --verbosity minimal
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/tests/spec/runners/csharp

  dart-spec:
    name: Dart Spec Tests
    needs: [rust-check, rust-spec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-dartspec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-dartspec-
      - name: Build shared library
        run: cargo build --release -p grafeo-c --features full
      - name: Copy library
        run: cp target/release/libgrafeo_c.so crates/bindings/dart/
      - name: Run spec tests
        working-directory: tests/spec/runners/dart
        run: |
          dart pub get
          dart test spec_runner_test.dart
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/crates/bindings/dart

  wasm-spec:
    name: WASM Spec Tests
    needs: [rust-check, rust-spec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall wasm-bindgen-cli@0.2.115 --no-confirm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasmspec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasmspec-
      - name: Build WASM
        run: bash scripts/build-wasm.sh
      - name: Run spec tests
        working-directory: tests/spec/runners/wasm
        run: |
          npm install
          npx vitest run

  # ── Full test matrices (gated by rust-check) ────────────────────

  # Rust tests (debug, all platforms)
  rust-test:
    name: Rust Test (${{ matrix.os }})
    needs: [rust-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      # Full profile: --all-features tests every language parser, AI index,
      # RDF store, algorithms, CDC, and other optional modules together.
      # This catches integration issues across feature combinations.
      # Spec tests are excluded here as they run in the dedicated rust-spec job.
      - name: Run tests
        run: cargo nextest run --all-features --workspace --exclude grafeo-spec-tests
        env:
          RUSTC_WRAPPER: sccache

      # nextest does not run doc-tests, so run them separately
      - name: Run doc-tests
        run: cargo test --all-features --workspace --doc
        env:
          RUSTC_WRAPPER: sccache

  # Rust tests (release, ubuntu only)
  # Release-mode catches issues from inlining and overflow checks.
  # These bugs are platform-independent, so one OS is sufficient.
  rust-test-release:
    name: Rust Test (release)
    needs: [rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Run tests (release)
        run: cargo nextest run --all-features --workspace --exclude grafeo-spec-tests --release
        env:
          RUSTC_WRAPPER: sccache

      - name: Run doc-tests (release)
        run: cargo test --all-features --workspace --doc --release
        env:
          RUSTC_WRAPPER: sccache

  # Feature matrix: test individual feature combinations that --all-features
  # masks. Catches per-feature cfg bugs, missing imports, and conditional
  # compilation issues. Runs on ubuntu only (feature bugs are OS-independent).
  rust-feature-matrix:
    name: Feature Matrix (${{ matrix.profile }})
    needs: [rust-check]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # GQL-only: minimal viable config (no AI, no RDF, no extra languages)
          - profile: gql-only
            features: "--features gql"
          # GQL + vector search: common embedded AI workload
          - profile: gql+vector
            features: "--features gql,vector-index"
          # GQL + RDF: mixed LPG/RDF without extra languages
          - profile: gql+rdf
            features: "--features gql,rdf"
          # Embedded profile: default for Python/Node.js bindings
          - profile: embedded
            features: "--features embedded"
          # Browser profile: WASM-targeted minimal set
          - profile: browser
            features: "--features browser"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-features-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-features-${{ matrix.profile }}-

      - name: Build (${{ matrix.profile }})
        run: cargo build --workspace --exclude grafeo-spec-tests --no-default-features ${{ matrix.features }}
        env:
          RUSTC_WRAPPER: sccache

      - name: Test (${{ matrix.profile }})
        run: cargo nextest run --workspace --exclude grafeo-spec-tests --no-default-features ${{ matrix.features }}
        env:
          RUSTC_WRAPPER: sccache

  # Miri undefined behavior check
  miri:
    name: Miri UB Check
    runs-on: ubuntu-latest
    # Pin nightly due to cargo regression in nightly-2026-02-12+
    # See: https://github.com/rust-lang/miri/issues/4855
    # Remove pin once rust-lang/cargo#16631 lands in nightly
    env:
      NIGHTLY: nightly-2026-02-11
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY }}
          components: miri

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-miri-${{ env.NIGHTLY }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-${{ env.NIGHTLY }}-

      - name: Setup Miri sysroot
        run: cargo +$NIGHTLY miri setup

      # Full profile: tests grafeo-common with all features under Miri to
      # verify no undefined behavior in the foundation crate (allocators,
      # hashing, MVCC types) regardless of which features are active.
      - name: Run Miri on grafeo-common
        run: cargo +$NIGHTLY miri test --all-features -p grafeo-common
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance"

  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Full profile: --all-features ensures coverage includes all language
      # parsers, AI features, and optional modules. Binding crates, build
      # scripts, test helpers, and benchmarks are excluded from the report.
      - name: Generate coverage report
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(crates/bindings/|build\.rs|tests/|benches/)'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

  # Python tests
  # Default profile: maturin builds grafeo-python with its crate-level default
  # features, which pull in "full" (all languages + AI) via grafeo-engine.
  python-test:
    name: Python Test (${{ matrix.os }}, Python ${{ matrix.python }})
    needs: [python-spec]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-

      - name: Build Python wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -m crates/bindings/python/Cargo.toml
          sccache: 'true'

      - name: Install Python package and test dependencies
        shell: bash
        run: |
          uv pip install --system dist/*.whl
          uv pip install --system pytest pytest-asyncio networkx numpy scipy solvor

      - name: Run Python tests
        run: pytest crates/bindings/python/tests/ -v --ignore=crates/bindings/python/tests/benchmark_phases.py

  # Node.js tests
  # Default profile: napi-rs builds grafeo-node with its crate-level default
  # features, which pull in "full" (all languages + AI) via grafeo-engine.
  node-test:
    name: Node.js Test (${{ matrix.os }}, Node ${{ matrix.node }})
    needs: [node-spec]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-node-

      - name: Install dependencies
        working-directory: crates/bindings/node
        run: npm install

      - name: Build native module
        working-directory: crates/bindings/node
        run: npm run build

      - name: Run tests
        working-directory: crates/bindings/node
        run: npm test

  # Go tests
  # Default profile: grafeo-c is built with --features full explicitly (see
  # the "Build shared library" step), so the Go FFI tests the full API surface.
  go-test:
    name: Go Test (${{ matrix.os }})
    needs: [go-spec]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-go-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-go-

      # Full profile (via "full" feature group): builds with all language
      # parsers and AI features so the C FFI exposes the complete API surface.
      # Go bindings call through this shared library.
      - name: Build shared library
        run: cargo build --release -p grafeo-c --features full

      - name: Copy library and run tests (Linux)
        if: runner.os == 'Linux'
        working-directory: crates/bindings/go
        run: |
          cp ../../../target/release/libgrafeo_c.so .
          CGO_ENABLED=1 CGO_LDFLAGS="-L. -lgrafeo_c -lm -ldl -lpthread" LD_LIBRARY_PATH=. go test -v ./...

      - name: Copy library and run tests (macOS)
        if: runner.os == 'macOS'
        working-directory: crates/bindings/go
        run: |
          cp ../../../target/release/libgrafeo_c.dylib .
          CGO_ENABLED=1 CGO_LDFLAGS="-L. -lgrafeo_c -lm -ldl -lpthread -framework Security" DYLD_LIBRARY_PATH=. go test -v ./...

      - name: Copy library and run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: crates/bindings/go
        shell: bash
        run: |
          cp ../../../target/release/grafeo_c.dll .
          cp ../../../target/release/grafeo_c.dll.lib .
          CGO_ENABLED=1 CGO_LDFLAGS="-L. -lgrafeo_c -lws2_32 -lbcrypt -lntdll -luserenv" go test -v ./...

  csharp-test:
    name: C# Test (${{ matrix.os }})
    needs: [csharp-spec]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-csharp-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-csharp-

      # Full profile: builds with all language parsers and AI features so the
      # C FFI exposes the complete API surface for the C# bindings.
      - name: Build shared library
        run: cargo build --release -p grafeo-c --features full

      - name: Copy library (Linux)
        if: runner.os == 'Linux'
        run: cp target/release/libgrafeo_c.so crates/bindings/csharp/tests/Grafeo.Tests/

      - name: Copy library (macOS)
        if: runner.os == 'macOS'
        run: cp target/release/libgrafeo_c.dylib crates/bindings/csharp/tests/Grafeo.Tests/

      - name: Copy library (Windows)
        if: runner.os == 'Windows'
        run: copy target\release\grafeo_c.dll crates\bindings\csharp\tests\Grafeo.Tests\

      - name: Restore
        run: dotnet restore
        working-directory: crates/bindings/csharp

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: crates/bindings/csharp

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: crates/bindings/csharp
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/crates/bindings/csharp/tests/Grafeo.Tests
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/crates/bindings/csharp/tests/Grafeo.Tests

  # Dart tests
  # Default profile: grafeo-c is built with --features full explicitly,
  # so the Dart FFI tests exercise the complete C API surface.
  dart-test:
    name: Dart Test (${{ matrix.os }})
    needs: [dart-spec]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-dart-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dart-

      - name: Build shared library
        run: cargo build --release -p grafeo-c --features full

      - name: Copy library (Linux)
        if: runner.os == 'Linux'
        run: cp target/release/libgrafeo_c.so crates/bindings/dart/

      - name: Copy library (macOS)
        if: runner.os == 'macOS'
        run: cp target/release/libgrafeo_c.dylib crates/bindings/dart/

      - name: Copy library (Windows)
        if: runner.os == 'Windows'
        run: copy target\release\grafeo_c.dll crates\bindings\dart\

      - name: Install dependencies
        working-directory: crates/bindings/dart
        run: dart pub get

      - name: Analyze
        working-directory: crates/bindings/dart
        run: dart analyze --fatal-infos

      - name: Run tests
        working-directory: crates/bindings/dart
        run: dart test
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/crates/bindings/dart
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/crates/bindings/dart

  # WASM build
  # WASM profile: builds with default-features = false and only the "gql"
  # feature enabled (minimal, no threads). The wasm32-unknown-unknown target
  # has no std::thread, so threading features, jemalloc/mimalloc allocators,
  # and other OS-dependent code are excluded. The build script
  # (scripts/build-wasm.sh) handles the exact cargo flags.
  wasm-build:
    name: WASM Build
    needs: [wasm-spec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall wasm-bindgen-cli@0.2.115 --no-confirm

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      # WASM profile: delegates to build-wasm.sh which compiles grafeo-wasm
      # with only the gql feature (no threads, no native allocators).
      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Check gzip size
        run: |
          SIZE=$(gzip -c crates/bindings/wasm/pkg/grafeo_wasm_bg.wasm | wc -c)
          echo "WASM gzip size: $SIZE bytes ($(( SIZE / 1024 )) KB)"
          if [ "$SIZE" -gt 409600 ]; then echo "::warning::WASM exceeds 400KB gzip target"; fi

  # Benchmark regression check (PR only, same-runner comparison)
  #
  # Runs both base and PR benchmarks on the same runner to eliminate
  # hardware variance from shared GitHub Actions VMs. Uses Criterion's
  # --save-baseline to store results, then critcmp to compare.
  benchmark-pr:
    name: Benchmark (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 45
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to checkout base commit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Install critcmp
        run: cargo install critcmp --locked

      # Run base benchmarks first. Any CPU thermal warming benefits
      # the PR run, making regressions easier to detect.
      - name: Checkout base
        run: git checkout ${{ github.event.pull_request.base.sha }}

      # Full profile: --all-features benchmarks include feature-gated indexes
      # (vector, text, ring) so perf regressions are caught across all modules.
      - name: Bench base
        run: |
          cargo bench --all-features \
            --bench arena_bench \
            --bench index_bench \
            --bench query_bench \
            -- --save-baseline base --noplot

      - name: Checkout PR head
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Bench PR
        run: |
          cargo bench --all-features \
            --bench arena_bench \
            --bench index_bench \
            --bench query_bench \
            -- --save-baseline pr --noplot

      - name: Compare and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/bench-compare.sh base pr 15 ${{ github.event.pull_request.number }}

  # Supply chain security (licenses, advisories, bans, sources)
  supply-chain:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
