name: Bug Report
description: Report a bug in Grafeo
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: |
        When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: |
        Minimal code or steps to reproduce the issue.
        You can also submit a `.gtest` test case (see [tests/spec/README.md](https://github.com/GrafeoDB/grafeo/blob/main/tests/spec/README.md)):
        ```yaml
        - name: my_bug
          skip: "describe the wrong behavior"
          query: "MATCH (n:A:B) RETURN n"
          expect:
            rows:
              - [expected_value]
        ```
      placeholder: |
        ```rust
        let db = GrafeoDB::open("test")?;
        // ...
        ```
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: Grafeo version and language (Rust/Python/Node.js)
      placeholder: "0.4.0, Python"
    validations:
      required: false
